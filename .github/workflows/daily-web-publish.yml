name: Daily Korea Stock Web Report

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - publish-daily-report
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-web-publish.yml"
  schedule:
    - cron: "40 16 * * 1-5"
      timezone: "Asia/Seoul"
    - cron: "10 17-20 * * 1-5"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  TZ: Asia/Seoul
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      REPORT_OUTPUT_DIR: ${{ github.workspace }}/published-reports
      MPLCONFIGDIR: ${{ github.workspace }}/stock-report-bot/.mplconfig
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: stock-report-bot/requirements.txt

      - name: Install dependencies
        working-directory: stock-report-bot
        run: pip install -r requirements.txt

      - name: Check required secrets
        run: |
          if [ -z "$NAVER_CLIENT_ID" ] || [ -z "$NAVER_CLIENT_SECRET" ]; then
            echo "Missing NAVER_CLIENT_ID or NAVER_CLIENT_SECRET repository secret."
            exit 1
          fi

      - name: Run tests
        working-directory: stock-report-bot
        run: python -m unittest discover -s tests

      - name: Generate daily report
        id: generate
        working-directory: stock-report-bot
        run: |
          mkdir -p "$REPORT_OUTPUT_DIR" "$MPLCONFIGDIR"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -m app.main
          else
            python -m app.main --skip-existing
          fi

          if [ -n "$(git -C "$GITHUB_WORKSPACE" status --porcelain -- published-reports)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        if: steps.generate.outputs.changed == 'true'
        working-directory: stock-report-bot
        run: python -m app.build_site --source-dir "$REPORT_OUTPUT_DIR" --output-dir "$GITHUB_WORKSPACE/public"

      - name: Commit generated report archive
        if: steps.generate.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add published-reports
          git diff --cached --quiet || git commit -m "Publish daily market report"
          git push origin HEAD:"$GITHUB_REF_NAME"

      - name: Configure Pages
        if: steps.generate.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.generate.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.generate.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
